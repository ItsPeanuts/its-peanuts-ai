services:
  # Backend API
  - type: web
    name: its-peanuts-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT --ws websockets
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: its-peanuts-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOOTSTRAP_TOKEN
        value: Peanuts-Setup-2025!

      # Admin account (automatisch aangemaakt bij opstart)
      - key: ADMIN_EMAIL
        value: admin@itspeanuts.ai
      - key: ADMIN_PASSWORD
        sync: false   # Stel in via Render dashboard — default: AdminPeanuts2025!

      # OpenAI (Lisa AI recruiter)
      - key: OPENAI_API_KEY
        sync: false   # Handmatig invullen in Render dashboard

      # E-mail notificaties via Resend (resend.com)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: ItsPeanuts AI <onboarding@resend.dev>
      - key: FRONTEND_URL
        value: https://its-peanuts-frontend.onrender.com

      # Microsoft Graph API (Teams meeting + agenda uitnodigingen)
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_ORGANIZER_EMAIL
        sync: false

      # Microsoft Teams Bot
      - key: TEAMS_BOT_APP_ID
        sync: false
      - key: TEAMS_BOT_APP_PASSWORD
        sync: false

      # CRM Integratie (hubspot of pipedrive, handmatig instellen)
      - key: CRM_PROVIDER
        sync: false
      - key: CRM_API_KEY
        sync: false

      # Virtuele AI Recruiter — D-ID Avatar (premium feature)
      - key: DID_API_KEY
        sync: false   # Aanmaken op d-id.com → API sectie
      - key: DID_PRESENTER_NAME
        value: "Amber"  # Naam van D-ID Studio avatar (bijv. Amber)
      - key: DID_PRESENTER_ID
        sync: false   # Uit talkingPreview URL: clips-presenters.d-id.com/v2/Amber/[ID]/...
      - key: DID_DRIVER_ID
        sync: false   # Uit talkingPreview URL: .../[PRESENTER_ID]/[DRIVER_ID]/talkingPreview.mp4
      - key: DID_PRESENTER_URL
        sync: false   # Eigen foto-URL (heeft voorrang boven DID_PRESENTER_ID als ingesteld)
      - key: VIRTUAL_INTERVIEW_THRESHOLD
        value: "60"   # Minimumscore voor auto-plan 2e gesprek

      # Stripe betalingen (abonnementen)
      - key: STRIPE_SECRET_KEY
        sync: false   # sk_live_... of sk_test_... van stripe.com/apikeys
      - key: STRIPE_WEBHOOK_SECRET
        sync: false   # whsec_... van stripe.com/webhooks
      - key: STRIPE_PRICE_NORMAAL_MAAND
        sync: false   # Stripe Price ID voor Normaal maandelijks
      - key: STRIPE_PRICE_NORMAAL_JAAR
        sync: false   # Stripe Price ID voor Normaal jaarlijks
      - key: STRIPE_PRICE_PREMIUM_MAAND
        sync: false   # Stripe Price ID voor Premium maandelijks
      - key: STRIPE_PRICE_PREMIUM_JAAR
        sync: false   # Stripe Price ID voor Premium jaarlijks

  # Frontend (Next.js)
  - type: web
    name: its-peanuts-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node_modules/.bin/next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://its-peanuts-backend.onrender.com

databases:
  # PostgreSQL database (free tier: 1GB, 90 dagen op free plan)
  - name: its-peanuts-db
    plan: free
    databaseName: its_peanuts
    user: its_peanuts_user

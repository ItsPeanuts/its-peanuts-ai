services:
  # Backend API
  - type: web
    name: its-peanuts-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: its-peanuts-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOOTSTRAP_TOKEN
        value: Peanuts-Setup-2025!

      # OpenAI (Lisa AI recruiter)
      - key: OPENAI_API_KEY
        sync: false   # Handmatig invullen in Render dashboard

      # E-mail notificaties via Resend (resend.com)
      # Aanmaken via: https://resend.com → API Keys
      # Domein verifiëren via: Resend → Domains (of gebruik onboarding@resend.dev voor testen)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: ItsPeanuts AI <onboarding@resend.dev>  # Verander naar eigen domein na verificatie
      - key: FRONTEND_URL
        value: https://its-peanuts-frontend.onrender.com

      # Microsoft Graph API (Teams meeting + agenda uitnodigingen)
      # Aanmaken via: https://portal.azure.com → Azure Active Directory → App registrations
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_ORGANIZER_EMAIL
        sync: false   # bijv. lisa@jouwbedrijf.nl

      # Microsoft Teams Bot (virtuele HR recruiter in Teams)
      # Aanmaken via: https://dev.botframework.com of Azure Bot Service
      - key: TEAMS_BOT_APP_ID
        sync: false
      - key: TEAMS_BOT_APP_PASSWORD
        sync: false

      # CRM Integratie (HubSpot standaard, ook Salesforce/Pipedrive mogelijk)
      # HubSpot: https://app.hubspot.com/private-apps → nieuwe Private App → token kopiëren
      - key: CRM_PROVIDER
        value: hubspot
      - key: CRM_API_KEY
        sync: false   # HubSpot Private App token
      - key: CRM_PORTAL_ID
        sync: false   # HubSpot portal ID (voor directe contact-links)

databases:
  # PostgreSQL database (free tier: 1GB, 90 dagen op free plan)
  - name: its-peanuts-db
    plan: free
    databaseName: its_peanuts
    user: its_peanuts_user

  # Frontend (Next.js)
  - type: web
    name: its-peanuts-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node_modules/.bin/next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://its-peanuts-backend.onrender.com

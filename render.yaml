services:
  # Backend API
  - type: web
    name: its-peanuts-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: its-peanuts-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOOTSTRAP_TOKEN
        value: Peanuts-Setup-2025!

      # OpenAI (Lisa AI recruiter)
      - key: OPENAI_API_KEY
        sync: false   # Handmatig invullen in Render dashboard

      # E-mail notificaties via Resend (resend.com)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: ItsPeanuts AI <onboarding@resend.dev>
      - key: FRONTEND_URL
        value: https://its-peanuts-frontend.onrender.com

      # Microsoft Graph API (Teams meeting + agenda uitnodigingen)
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_ORGANIZER_EMAIL
        sync: false

      # Microsoft Teams Bot
      - key: TEAMS_BOT_APP_ID
        sync: false
      - key: TEAMS_BOT_APP_PASSWORD
        sync: false

      # CRM Integratie (HubSpot standaard)
      - key: CRM_PROVIDER
        value: hubspot
      - key: CRM_API_KEY
        sync: false
      - key: CRM_PORTAL_ID
        sync: false

  # Frontend (Next.js)
  - type: web
    name: its-peanuts-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node_modules/.bin/next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://its-peanuts-backend.onrender.com

databases:
  # PostgreSQL database (free tier: 1GB, 90 dagen op free plan)
  - name: its-peanuts-db
    plan: free
    databaseName: its_peanuts
    user: its_peanuts_user
